services:
  imou-portal:
    build: .
    container_name: imou-portal
    restart: unless-stopped
    ports:
      - "5010:5000"
    env_file: .env
    volumes:
      - imou-data:/data    # Persistent storage for SQLite DB and logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/login')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  imou-data:
    driver: local
