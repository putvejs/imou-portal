<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imou Portal — Camera Dashboard</title>

  <!-- React + Babel (no build step required) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- HLS.js for in-browser live stream playback -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #070d1a;
      --bg2: #0a1020;
      --card: rgba(12, 20, 40, 0.9);
      --card-hover: rgba(15, 25, 48, 0.95);
      --border: rgba(59, 130, 246, 0.15);
      --border-bright: rgba(59, 130, 246, 0.4);
      --blue: #3b82f6;
      --blue-dark: #2563eb;
      --cyan: #22d3ee;
      --teal: #0891b2;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --danger-dark: #dc2626;
      --sidebar-w: 340px;
      --header-h: 64px;
    }

    html, body, #root { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(59,130,246,0.5); }

    /* ── Layout ── */
    .app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    .header {
      height: var(--header-h);
      background: rgba(7, 13, 26, 0.95);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      flex-shrink: 0;
      backdrop-filter: blur(12px);
      position: relative;
      z-index: 50;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-badge {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(59,130,246,0.4);
    }

    .logo-name {
      font-size: 17px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 60%, var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-stats {
      display: flex;
      gap: 20px;
      margin-left: 24px;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .stat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-green { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .dot-red   { background: var(--danger); }
    .dot-blue  { background: var(--blue); }

    .header-spacer { flex: 1; }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 16px;
      color: var(--text-dim);
      position: relative;
    }

    .icon-btn:hover { background: rgba(59,130,246,0.1); border-color: var(--border-bright); color: var(--text); }
    .icon-btn.active { background: rgba(59,130,246,0.15); border-color: var(--blue); color: var(--blue); }

    .badge {
      position: absolute;
      top: -4px; right: -4px;
      min-width: 18px; height: 18px;
      background: var(--danger);
      border-radius: 9px;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      color: #fff;
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 13px;
    }

    .user-menu:hover { border-color: var(--border-bright); }

    /* ── Main body ── */
    .main-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Camera grid ── */
    .camera-section {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn:hover { background: rgba(59,130,246,0.1); border-color: var(--border-bright); color: var(--text); }
    .btn.active, .btn-primary {
      background: rgba(59,130,246,0.2);
      border-color: var(--blue);
      color: var(--blue);
    }
    .btn-danger { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.4); color: var(--danger); }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* ── Camera Grid ── */
    .camera-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .camera-grid.layout-2 { grid-template-columns: repeat(2, 1fr); }
    .camera-grid.layout-3 { grid-template-columns: repeat(3, 1fr); }
    .camera-grid.layout-4 { grid-template-columns: repeat(4, 1fr); }
    .camera-grid.layout-1 { grid-template-columns: 1fr; }

    .camera-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
    }

    .camera-card:hover { border-color: var(--border-bright); transform: translateY(-1px); }
    .camera-card.selected { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue); }

    /* Camera viewport */
    .camera-view {
      position: relative;
      padding-top: 56.25%; /* 16:9 */
      background: #000;
      overflow: hidden;
    }

    .camera-view img,
    .camera-view video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .camera-view .no-signal {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 13px;
      gap: 8px;
      background: rgba(0,0,0,0.8);
    }

    .camera-view .no-signal-icon { font-size: 32px; opacity: 0.4; }

    .camera-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 8px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .camera-card:hover .camera-overlay { opacity: 1; }

    .camera-timestamp {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(0,0,0,0.6);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      color: rgba(255,255,255,0.8);
      font-family: monospace;
    }

    .live-badge {
      position: absolute;
      top: 8px; left: 8px;
      background: var(--danger);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Camera info */
    .camera-info {
      padding: 12px 14px;
    }

    .camera-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .camera-name {
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-indicator {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-online { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-offline { background: var(--text-muted); }
    .status-warning { background: var(--warning); box-shadow: 0 0 6px var(--warning); }

    .camera-meta {
      display: flex;
      gap: 12px;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .camera-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* ── PTZ Overlay ── */
    .ptz-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .ptz-panel {
      background: var(--card);
      border: 1px solid var(--border-bright);
      border-radius: 20px;
      padding: 28px;
      min-width: 320px;
      position: relative;
    }

    .ptz-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
    }

    .ptz-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .ptz-btn {
      aspect-ratio: 1;
      background: rgba(59,130,246,0.1);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
      user-select: none;
    }

    .ptz-btn:hover { background: rgba(59,130,246,0.25); border-color: var(--blue); }
    .ptz-btn:active { transform: scale(0.92); background: rgba(59,130,246,0.4); }
    .ptz-btn.stop { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); }

    .ptz-zoom-row {
      display: flex;
      gap: 8px;
    }

    .ptz-zoom-row .ptz-btn { flex: 1; aspect-ratio: auto; padding: 10px; font-size: 14px; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      border-left: 1px solid var(--border);
      background: rgba(7, 13, 26, 0.95);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.3s;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-title {
      font-size: 14px;
      font-weight: 600;
    }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Notification items */
    .notif-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .notif-item:hover { background: rgba(59,130,246,0.08); border-color: var(--border-bright); }
    .notif-item.unread { border-left: 3px solid var(--blue); }
    .notif-item.motion { border-left-color: var(--warning); }
    .notif-item.human { border-left-color: var(--danger); }

    .notif-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .notif-type {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .notif-time {
      font-size: 10px;
      color: var(--text-muted);
    }

    .notif-device { font-size: 12px; color: var(--text-dim); }

    .notif-filter-bar {
      display: flex;
      gap: 4px;
      padding: 6px 12px 4px;
      flex-wrap: wrap;
    }
    .notif-filter-btn {
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
    }
    .notif-filter-btn:hover { border-color: var(--blue); color: var(--text); }
    .notif-filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* Camera group card (camera + its alerts) */
    .camera-group-card {
      display: flex;
      flex-direction: column;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .camera-group-card .camera-card {
      border: none;
      border-radius: 0;
      background: transparent;
      margin-bottom: 0;
    }
    .cam-alerts-list {
      border-top: 1px solid var(--border);
      max-height: 220px;
      overflow-y: auto;
    }
    .cam-alert-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: background 0.12s;
    }
    .cam-alert-row:last-child { border-bottom: none; }
    .cam-alert-row:hover { background: rgba(59,130,246,0.08); }
    .cam-alert-row.unread { border-left: 3px solid var(--blue); }
    .cam-alert-row.motion { border-left-color: var(--warning); }
    .cam-alert-row.human  { border-left-color: var(--danger); }
    .cam-alert-thumb {
      width: 64px;
      height: 40px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      background: #0a0f1e;
    }
    .cam-alert-thumb-placeholder {
      width: 64px;
      height: 40px;
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .cam-alert-info {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-width: 0;
    }
    .cam-alert-type { font-size: 12px; font-weight: 600; }
    .cam-alert-time { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .cam-alerts-empty {
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    .notif-group { margin-bottom: 6px; }

    .notif-group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 10px;
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      margin-bottom: 2px;
    }
    .notif-group-header:hover { background: rgba(59,130,246,0.14); }
    .notif-group-name { font-size: 12px; font-weight: 600; color: var(--text); }

    .notif-group .notif-item { margin-left: 8px; border-radius: 6px; }

    .notif-image {
      width: 100%;
      border-radius: 6px;
      margin-top: 8px;
      max-height: 150px;
      object-fit: cover;
      cursor: zoom-in;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 32px 16px;
    }

    .empty-state-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      padding: 20px;
    }

    .modal {
      background: #0d1a35;
      border: 1px solid var(--border-bright);
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal-close {
      position: absolute;
      top: 20px; right: 20px;
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .modal-close:hover { background: rgba(239,68,68,0.1); color: var(--danger); }

    /* Form elements in modals */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .form-input, .form-select {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus, .form-select:focus { border-color: var(--blue); }
    .form-select option { background: #0d1a35; }

    /* Settings sections */
    .settings-section {
      margin-bottom: 24px;
    }

    .settings-section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* Toggle switch */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .toggle-label { font-size: 13px; }
    .toggle-desc { font-size: 11px; color: var(--text-muted); }

    .toggle {
      width: 40px; height: 22px;
      background: var(--border);
      border-radius: 11px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .toggle.on { background: var(--blue); }

    .toggle::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      background: #fff;
      border-radius: 50%;
      top: 2px; left: 2px;
      transition: transform 0.2s;
    }

    .toggle.on::after { transform: translateX(18px); }

    /* Toast notifications */
    .toast-container {
      position: fixed;
      bottom: 20px; right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 500;
      pointer-events: none;
    }

    .toast {
      background: #0d1a35;
      border: 1px solid var(--border-bright);
      border-radius: 12px;
      padding: 12px 16px;
      min-width: 280px;
      max-width: 360px;
      pointer-events: all;
      animation: slideIn 0.3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .toast-motion { border-color: rgba(245,158,11,0.6); }
    .toast-human { border-color: rgba(239,68,68,0.6); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .toast-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .toast-icon { font-size: 16px; }
    .toast-title { font-size: 13px; font-weight: 600; }
    .toast-body { font-size: 12px; color: var(--text-dim); }
    .toast-img { width: 100%; border-radius: 6px; margin-top: 8px; max-height: 100px; object-fit: cover; }

    /* Stream viewer */
    .stream-modal video {
      width: 100%;
      border-radius: 8px;
      background: #000;
      max-height: 400px;
    }

    .stream-info {
      margin-top: 12px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      font-family: monospace;
      word-break: break-all;
      color: var(--cyan);
    }

    /* Loading spinner */
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(59,130,246,0.2);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Info tags */
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      background: rgba(59,130,246,0.1);
      color: var(--blue);
      border: 1px solid rgba(59,130,246,0.2);
    }

    .tag-green { background: rgba(16,185,129,0.1); color: var(--success); border-color: rgba(16,185,129,0.2); }
    .tag-red   { background: rgba(239,68,68,0.1); color: var(--danger); border-color: rgba(239,68,68,0.2); }
    .tag-yellow{ background: rgba(245,158,11,0.1); color: var(--warning); border-color: rgba(245,158,11,0.2); }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .sidebar.mobile-open {
        display: flex;
        position: fixed;
        top: var(--header-h);
        right: 0; bottom: 0;
        z-index: 100;
        box-shadow: -4px 0 20px rgba(0,0,0,0.5);
      }
      .camera-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .header-stats { display: none; }
    }

    @media (max-width: 600px) {
      .camera-grid { grid-template-columns: 1fr !important; }
      .camera-section { padding: 12px; }
      :root { --sidebar-w: 100%; }
    }

    @media (max-width: 480px) {
      .header { padding: 0 12px; }
      .logo-name { display: none; }
    }

    /* Detail panel under image (single camera view) */
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .detail-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .detail-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-value { font-size: 14px; font-weight: 600; margin-top: 4px; }
  </style>
</head>

  <div id="root"></div>

  <script type="text/babel" src="CameraDashboard.jsx?v=10"></script>
